name = "my-dexter"
main = "worker/index.js"
compatibility_date = "2026-05-05"

[build]
command = "npm run build:worker"

[vars]
APP_ORIGIN = "https://dexter.mom"
PAYMENT_PROVIDER = "creem"
CREEM_ENV = "live"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "404"
run_worker_first = [
  "/api/*",
  "/sitemap.xml",
  "/robots.txt"
]
